name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for version change
        id: version
        run: |
          CURRENT_VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ "$LATEST_TAG" = "null" ]; then LATEST_TAG=""; fi

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          elif [ "$LATEST_TAG" = "v${CURRENT_VERSION}" ]; then
            echo "Version v${CURRENT_VERSION} already released, skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: v${CURRENT_VERSION} (latest release: ${LATEST_TAG})"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          if [ -n "$PREVIOUS_TAG" ]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --notes-start-tag "$PREVIOUS_TAG"
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes
          fi
